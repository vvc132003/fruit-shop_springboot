<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Đặt hàng</title>
<!-- <link rel="stylesheet" href="<?= BASE_URL ?>/assets/css/style.css"> -->
<!-- Google Web Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
	rel="stylesheet">

<!-- Icon Font Stylesheet -->
<link rel="stylesheet"
	href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
	rel="stylesheet">

<!-- Libraries Stylesheet -->
<link href="/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
<link href="/lib/owlcarousel/assets/owl.carousel.min.css"
	rel="stylesheet">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


<!-- Customized Bootstrap Stylesheet -->
<link href="/css/bootstrap.min.css" rel="stylesheet">

<!-- Template Stylesheet -->
<link href="/css/style.css" rel="stylesheet">
</head>
<body>
	<!-- Spinner Start -->
	<div id="spinner"
		class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
		<div class="spinner-grow text-primary" role="status"></div>
	</div>
	<!-- Spinner End -->
	<div th:replace="~{user/layouts/header :: header}"></div>
	<div class="container-fluid page-header py-5">
		<h1 class="text-center text-white display-6">Đặt hàng</h1>
		<ol class="breadcrumb justify-content-center mb-0">
			<li class="breadcrumb-item"><a href="#">Trang chủ</a></li>
			<li class="breadcrumb-item"><a href="#">Trang</a></li>
			<li class="breadcrumb-item active text-white">Đặt hàng</li>
		</ol>
	</div>
	<div class="container-fluid py-5">
		<div class="container py-5">

			<!-- flash error -->
			<div th:if="${flash_error}"
				class="alert alert-danger alert-dismissible fade show" role="alert">
				<span th:text="${flash_error}"></span>
				<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
			</div>

			<h1 class="mb-4">Chi tiết đặt hàng</h1>

			<form method="post" th:action="@{/orders/place}">

				<div class="row g-5">

					<div class="col-md-12 col-lg-6 col-xl-7">

						<div class="row">

							<div class="col-md-12 col-lg-6">
								<div class="form-item w-100">
									<label class="form-label my-3">Họ<sup>*</sup></label> <input
										type="text" class="form-control" name="first_name"
										th:value="${session.user.firstName}" readonly>

								</div>
							</div>

							<div class="col-md-12 col-lg-6">
								<div class="form-item w-100">

									<label class="form-label my-3">Tên<sup>*</sup></label> <input
										type="text" class="form-control" name="last_name"
										th:value="${session.user.lastName}" readonly>

								</div>
							</div>

						</div>

						<div class="form-item">
							<label class="form-label my-3">Địa chỉ<sup>*</sup></label> <input
								type="text" class="form-control" name="address"
								th:value="${session.user.address}" readonly>

						</div>

						<div class="form-item">
							<label class="form-label my-3">Số điện thoại<sup>*</sup></label>

							<input type="tel" class="form-control" name="phone"
								th:value="${session.user.phone}" readonly>

						</div>

						<div class="form-item">
							<label class="form-label my-3">Email<sup>*</sup></label> <input
								type="email" class="form-control" name="email"
								th:value="${session.user.email}" readonly>

						</div>

						<hr>

						<div class="form-item">
							<label class="form-label my-3">Địa chỉ nhận hàng<sup>*</sup></label>

							<textarea name="shipping_address" class="form-control" cols="30"
								rows="5" placeholder="Vui lòng nhập địa chỉ nhận hàng" required></textarea>

						</div>

					</div>

					<div class="col-md-12 col-lg-6 col-xl-5">

						<div class="table-responsive">

							<table class="table">

								<thead>
									<tr>
										<th scope="col">Ảnh</th>
										<th scope="col">Tên</th>
										<th scope="col">Gía bán</th>
										<th scope="col">Số lượng</th>
										<th scope="col">Thành tiền</th>
									</tr>
								</thead>

								<tbody>

									<tr th:each="item : ${items}">

										<th scope="row">
											<div class="d-flex align-items-center mt-2">

												<img
													th:src="'data:image/jpeg;base64,' + ${item.product.image}"
													class="img-fluid me-5 rounded-circle"
													style="width: 80px; height: 80px;"
													th:alt="${item.product.name}">

											</div>
										</th>

										<td class="py-5" th:text="${item.product.name}"></td>

										<td class="py-5"
											th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'">
										</td>

										<td class="py-5" th:text="${item.quantity}"></td>

										<td class="py-5"
											th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'">
										</td>

									</tr>

									<tr th:if="${#lists.isEmpty(items)}">
										<td colspan="6" class="text-center py-5"><strong>Giỏ
												hàng trống 🛒</strong></td>
									</tr>

								</tbody>

							</table>

						</div>

						<div
							class="py-4 mb-4 border-bottom d-flex justify-content-between">

							<h5 class="mb-0 ps-4 me-4">Tổng sản phẩm</h5>

							<h5 class="mb-0 pe-4" id="total-price" th:text="${totalQuantity}">
							</h5>

						</div>

						<div
							class="py-4 mb-4 border-bottom d-flex justify-content-between">

							<h5 class="mb-0 ps-4 me-4">Tổng tiền</h5>

							<h5 class="mb-0 pe-4 text-danger" id="total-price"
								th:text="${#numbers.formatDecimal(totalPrice,0,'COMMA',0,'POINT')} + ' đ'">
							</h5>

						</div>

						<div
							class="row g-4 text-center align-items-center justify-content-center border-bottom py-3">

							<div class="col-12">

								<div class="form-check text-start my-3">

									<input type="checkbox"
										class="form-check-input bg-primary border-0" id="cod-1"
										name="payment_method" checked disabled value="cod"> <label
										class="form-check-label" for="cod-1"> Thanh toán khi
										nhận hàng </label>

								</div>

							</div>

						</div>

						<div
							class="row g-4 text-center align-items-center justify-content-center pt-4">

							<button type="submit"
								class="btn border-secondary py-3 px-4 text-uppercase w-100 text-primary">
								Đặt hàng</button>

						</div>

					</div>

				</div>

			</form>

		</div>
	</div>
	<div th:replace="~{user/layouts/footer :: footer}"></div>

	<!-- Back to Top -->
	<a href="#"
		class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
		class="fa fa-arrow-up"></i></a>


	<!-- JavaScript Libraries -->
	<script
		src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/lib/easing/easing.min.js"></script>
	<script src="/lib/waypoints/waypoints.min.js"></script>
	<script src="/lib/lightbox/js/lightbox.min.js"></script>
	<script src="/lib/owlcarousel/owl.carousel.min.js"></script>

	<!-- Template Javascript -->
	<script src="/js/main.js"></script>

</body>

</html>
