<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Đăng ký</title>
<!-- <link rel="stylesheet" href="<?= BASE_URL ?>/assets/css/style.css"> -->
<!-- Google Web Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
	rel="stylesheet">

<!-- Icon Font Stylesheet -->
<link rel="stylesheet"
	href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
	rel="stylesheet">

<!-- Libraries Stylesheet -->
<link href="/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
<link href="/lib/owlcarousel/assets/owl.carousel.min.css"
	rel="stylesheet">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


<!-- Customized Bootstrap Stylesheet -->
<link href="/css/bootstrap.min.css" rel="stylesheet">

<!-- Template Stylesheet -->
<link href="/css/style.css" rel="stylesheet">
</head>
<body>
	<!-- Spinner Start -->
	<div id="spinner"
		class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
		<div class="spinner-grow text-primary" role="status"></div>
	</div>
	<!-- Spinner End -->
	<div th:replace="~{user/layouts/header :: header}"></div>

	<div class="container-fluid page-header py-5">
		<h1 class="text-center text-white display-6">Đăng ký tài khoản</h1>
		<ol class="breadcrumb justify-content-center mb-0">
			<li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
			<li class="breadcrumb-item active text-white">Đăng ký</li>
		</ol>
	</div>


	<div class="container-fluid py-5">
		<div class="container py-5">
			<div class="row justify-content-center">
				<div class="col-md-10 col-lg-6">

					<h2 class="mb-4 text-center">Tạo tài khoản mới</h2>
					<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
					<form th:action="@{/auth/register}" th:object="${user}"
						method="post">

						<div class="row">
							<div class="col-md-6 mb-3">
								<label class="form-label">Họ</label> <input type="text"
									th:field="*{firstName}" class="form-control" required>
							</div>

							<div class="col-md-6 mb-3">
								<label class="form-label">Tên</label> <input type="text"
									th:field="*{lastName}" class="form-control" required>
							</div>
						</div>

						<div class="mb-3">
							<label class="form-label">Số điện thoại</label> <input
								type="text" th:field="*{phone}" class="form-control" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Email</label> <input type="email"
								th:field="*{email}" class="form-control" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Địa chỉ</label> <input type="text"
								th:field="*{address}" class="form-control">
						</div>

						<div class="mb-3">
							<label class="form-label">Mật khẩu</label> <input type="password"
								name="password" class="form-control" required>
						</div>

						<div class="mb-4">
							<label class="form-label">Nhập lại mật khẩu</label> <input
								type="password" name="confirmPassword" class="form-control"
								required>
						</div>

						<button type="submit" class="btn btn-primary w-100 py-3">
							Đăng ký</button>

						<p class="text-center mt-3">
							Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
						</p>

					</form>

				</div>
			</div>
		</div>
	</div>

	<div th:replace="~{user/layouts/footer :: footer}"></div>

	<!-- Back to Top -->
	<a href="#"
		class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
		class="fa fa-arrow-up"></i></a>


	<!-- JavaScript Libraries -->
	<script
		src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/lib/easing/easing.min.js"></script>
	<script src="/lib/waypoints/waypoints.min.js"></script>
	<script src="/lib/lightbox/js/lightbox.min.js"></script>
	<script src="/lib/owlcarousel/owl.carousel.min.js"></script>

	<!-- Template Javascript -->
	<script src="/js/main.js"></script>

</body>

</html>
