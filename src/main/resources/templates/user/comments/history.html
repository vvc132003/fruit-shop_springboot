<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lịch bình luận</title>
<!-- <link rel="stylesheet" href="<?= BASE_URL ?>/assets/css/style.css"> -->
<!-- Google Web Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
	rel="stylesheet">

<!-- Icon Font Stylesheet -->
<link rel="stylesheet"
	href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
	rel="stylesheet">

<!-- Libraries Stylesheet -->
<link href="/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
<link href="/lib/owlcarousel/assets/owl.carousel.min.css"
	rel="stylesheet">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


<!-- Customized Bootstrap Stylesheet -->
<link href="/css/bootstrap.min.css" rel="stylesheet">

<!-- Template Stylesheet -->
<link href="/css/style.css" rel="stylesheet">
</head>
<body>
	<!-- Spinner Start -->
	<div id="spinner"
		class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
		<div class="spinner-grow text-primary" role="status"></div>
	</div>
	<!-- Spinner End -->
	<div th:replace="~{user/layouts/header :: header}"></div>
	<div class="container-fluid page-header py-5">
		<h1 class="text-center text-white display-6">Lịch sử bình luận</h1>
		<ol class="breadcrumb justify-content-center mb-0">
			<li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
			<li class="breadcrumb-item active text-white">Lịch sử bình luận
			</li>
		</ol>
	</div>
	<div class="container-fluid py-5">
		<div class="container py-5">

			<div class="table-responsive">
				<table class="table align-middle">
					<thead>
						<tr>
							<th>Mã bình luận</th>
							<th>Sản phẩm</th>
							<th>Nội dung</th>
							<th>Trạng thái</th>
							<th>Ngày bình luận</th>
							<th>Chi tiết</th>
						</tr>
					</thead>

					<tbody>

						<!-- Nếu không có comment -->
						<tr th:if="${#lists.isEmpty(comments)}">
							<td colspan="6" class="text-center py-5"><strong>Bạn
									chưa có bình luận nào 💬</strong></td>
						</tr>

						<!-- Loop comment -->
						<tr th:each="c : ${comments}">

							<!-- ID -->
							<td th:text="'#' + ${c.id}"></td>

							<!-- Product -->
							<td>
								<div class="d-flex align-items-center">

									<img th:src="'data:image/jpeg;base64,' + ${c.product.image}"
										width="60" class="rounded me-3" alt=""> <strong
										th:text="${c.product.name}"></strong>

								</div>
							</td>

							<!-- Content -->
							<td style="max-width: 400px;" th:text="${c.content}"></td>

							<!-- Status -->
							<td><span th:if="${c.status.name() == 'pending'}"
								class="badge bg-warning"> Chờ duyệt </span> <span
								th:if="${c.status.name() == 'approved'}"
								class="badge bg-success"> Đã duyệt </span> <span
								th:if="${c.status.name() == 'rejected'}" class="badge bg-danger">
									Từ chối </span></td>

							<!-- Date -->
							<td
								th:text="${#temporals.format(c.createdAt,'dd/MM/yyyy HH:mm')}"></td>

							<!-- Action -->
							<td><a th:href="@{/shop_detail(id=${c.product.id})}"
								class="btn btn-sm btn-outline-primary"> Xem </a> <a
								th:href="@{/comments/delete(id=${c.id})}"
								class="btn btn-sm btn-outline-danger"
								onclick="return confirm('Bạn có chắc muốn xoá bình luận này?')">
									Xoá </a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</div>
	<div th:replace="~{user/layouts/footer :: footer}"></div>

	<!-- Back to Top -->
	<a href="#"
		class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
		class="fa fa-arrow-up"></i></a>


	<!-- JavaScript Libraries -->
	<script
		src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/lib/easing/easing.min.js"></script>
	<script src="/lib/waypoints/waypoints.min.js"></script>
	<script src="/lib/lightbox/js/lightbox.min.js"></script>
	<script src="/lib/owlcarousel/owl.carousel.min.js"></script>

	<!-- Template Javascript -->
	<script src="/js/main.js"></script>

</body>

</html>
