<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Lịch sử đơn hàng</title>
<!-- <link rel="stylesheet" href="<?= BASE_URL ?>/assets/css/style.css"> -->
<!-- Google Web Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
	href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap"
	rel="stylesheet">

<!-- Icon Font Stylesheet -->
<link rel="stylesheet"
	href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
	rel="stylesheet">

<!-- Libraries Stylesheet -->
<link href="/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
<link href="/lib/owlcarousel/assets/owl.carousel.min.css"
	rel="stylesheet">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


<!-- Customized Bootstrap Stylesheet -->
<link href="/css/bootstrap.min.css" rel="stylesheet">

<!-- Template Stylesheet -->
<link href="/css/style.css" rel="stylesheet">
</head>
<body>
	<!-- Spinner Start -->
	<div id="spinner"
		class="show w-100 vh-100 bg-white position-fixed translate-middle top-50 start-50  d-flex align-items-center justify-content-center">
		<div class="spinner-grow text-primary" role="status"></div>
	</div>
	<!-- Spinner End -->
	<div th:replace="~{user/layouts/header :: header}"></div>
	<div class="container-fluid page-header py-5">
		<h1 class="text-center text-white display-6">Lịch sử mua hàng</h1>
		<ol class="breadcrumb justify-content-center mb-0">
			<li class="breadcrumb-item"><a href="/">Trang chủ</a></li>
			<li class="breadcrumb-item active text-white">Lịch sử mua hàng</li>
		</ol>
	</div>
	<div class="container-fluid py-5">
		<div class="container py-5">
			<div class="table-responsive">
				<table class="table">
					<thead>
						<tr>
							<th>Mã đơn</th>
							<th>Ngày đặt</th>
							<th>Người nhận</th>
							<th>Trạng thái</th>
							<th>Tổng tiền</th>
							<th>Chi tiết</th>
						</tr>
					</thead>

					<tbody>

						<!-- nếu có đơn -->
						<tr th:each="o : ${orders}">
							<td>#<span th:text="${o.id}"></span></td>

							<td
								th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>

							<td><span th:text="${o.receiverName}"></span><br> <small
								class="text-muted" th:text="${o.receiverPhone}"></small></td>

							<!-- STATUS -->
							<td><span class="badge bg-warning"
								th:if="${o.status.name() == 'pending'}"> Chờ xử lý </span> <span
								class="badge bg-info" th:if="${o.status.name() == 'shipping'}">
									Đang giao </span> <span class="badge bg-success"
								th:if="${o.status.name() == 'completed'}"> Hoàn thành </span> <span
								class="badge bg-danger"
								th:if="${o.status.name() == 'cancelled'}"> Đã huỷ </span> <span
								class="badge bg-primary" th:if="${o.status.name() == 'paid'}">
									Đã thanh toán </span></td>


							<!-- TOTAL -->
							<td class="text-danger fw-bold"
								th:text="${#numbers.formatDecimal(o.total,0,'COMMA',0,'POINT')} + ' đ'">
							</td>

							<!-- DETAIL -->
							<td><a th:href="@{/orders/show(id=${o.id})}"
								class="btn btn-sm btn-outline-primary"> Xem </a></td>
						</tr>

						<!-- nếu không có đơn -->
						<tr th:if="${#lists.isEmpty(orders)}">
							<td colspan="7" class="text-center py-5"><strong>Bạn
									chưa có đơn hàng nào 📦</strong></td>
						</tr>

					</tbody>

				</table>
			</div>
		</div>
	</div>
	<div th:replace="~{user/layouts/footer :: footer}"></div>

	<!-- Back to Top -->
	<a href="#"
		class="btn btn-primary border-3 border-primary rounded-circle back-to-top"><i
		class="fa fa-arrow-up"></i></a>


	<!-- JavaScript Libraries -->
	<script
		src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="/lib/easing/easing.min.js"></script>
	<script src="/lib/waypoints/waypoints.min.js"></script>
	<script src="/lib/lightbox/js/lightbox.min.js"></script>
	<script src="/lib/owlcarousel/owl.carousel.min.js"></script>

	<!-- Template Javascript -->
	<script src="/js/main.js"></script>

</body>

</html>
