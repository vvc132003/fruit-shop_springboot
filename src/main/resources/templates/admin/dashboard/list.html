
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Doanh thu</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">

<link rel="stylesheet" href="/assets/css/portal.css" media="all">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<div class="col-auto">
					<h1 class="app-page-title mb-0">Doanh thu</h1>
				</div>

				<br>

				<div class="row g-4 mb-4">

					<!-- TOTAL SALES -->

					<div class="col-6 col-lg-3">
						<div class="app-card app-card-stat shadow-sm h-100">

							<div class="app-card-body p-3 p-lg-4">

								<h4 class="stats-type mb-1">Tổng doanh thu</h4>

								<div class="stats-figure"
									th:text="${#numbers.formatDecimal(totalSales,0,'COMMA',0,'POINT')} + ' ₫'">
								</div>

								<div class="stats-meta"
									th:classappend="${changePercent >= 0} ? 'text-success' : 'text-danger'">

									<!-- ICON UP -->
									<svg th:if="${changePercent >= 0}" width="1em" height="1em"
										viewBox="0 0 16 16" class="bi bi-arrow-up" fill="currentColor">

                                    <path fill-rule="evenodd"
											d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5.0 0 0 .708-.708l-4-4a.5.5.0 0 0-.708 0l-4 4a.5.5.0 1 0 .708.708L7.5 2.707V14.5a.5.5.0 0 0 .5.5z" />
                                </svg>

									<!-- ICON DOWN -->
									<svg th:if="${changePercent < 0}" width="1em" height="1em"
										viewBox="0 0 16 16" class="bi bi-arrow-down"
										fill="currentColor">

                                    <path fill-rule="evenodd"
											d="M8 1a.5.5.0 0 1 .5.5v11.793l3.146-3.147a.5.5.0 0 1 .708.708l-4 4a.5.5.0 0 1-.708 0l-4-4a.5.5.0 0 1 .708-.708L7.5 13.293V1.5a.5.5.0 0 1 .5-.5z" />
                                </svg>

									<span
										th:text="${#numbers.formatDecimal(T(java.lang.Math).abs(changePercent),1,'COMMA',1,'POINT')}"></span>
									% so với tháng trước

								</div>

							</div>

							<a class="app-card-link-mask" href="#"></a>

						</div>
					</div>

					<!-- EXPENSE -->

					<div class="col-6 col-lg-3">
						<div class="app-card app-card-stat shadow-sm h-100">

							<div class="app-card-body p-3 p-lg-4">

								<h4 class="stats-type mb-1">Chi phí phát sinh</h4>

								<div class="stats-figure"
									th:text="${#numbers.formatDecimal(expenses,0,'COMMA',0,'POINT')} + ' ₫'">
								</div>

								<div class="stats-meta text-success">

									<svg width="1em" height="1em" viewBox="0 0 16 16"
										class="bi bi-arrow-down" fill="currentColor">

                                    <path fill-rule="evenodd"
											d="M8 1a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L7.5 13.293V1.5A.5.5 0 0 1 8 1z" />
                                </svg>

									5%

								</div>

							</div>

							<a class="app-card-link-mask" href="#"></a>

						</div>
					</div>

					<!-- PRODUCTS -->

					<div class="col-6 col-lg-3">
						<div class="app-card app-card-stat shadow-sm h-100">

							<div class="app-card-body p-3 p-lg-4">

								<h4 class="stats-type mb-1">Sản phẩm</h4>

								<div class="stats-figure" th:text="${countP}"></div>

								<div class="stats-meta">Open</div>

							</div>

							<a class="app-card-link-mask" href="#"></a>

						</div>
					</div>

					<!-- ORDERS -->

					<div class="col-6 col-lg-3">
						<div class="app-card app-card-stat shadow-sm h-100">

							<div class="app-card-body p-3 p-lg-4">

								<h4 class="stats-type mb-1">Đơn hàng</h4>

								<div class="stats-figure" th:text="${totalOrders}"></div>

								<div class="stats-meta">New</div>

							</div>

							<a class="app-card-link-mask" href="#"></a>

						</div>
					</div>

				</div>

				<!-- CHARTS -->

				<div class="row g-4 mb-4">

					<div class="col-12 col-lg-6">

						<div class="app-card app-card-chart h-100 shadow-sm">

							<div class="app-card-header p-3">

								<div class="row justify-content-between align-items-center">

									<div class="col-auto">
										<h4 class="app-card-title">So sánh doanh thu 7 ngày gần
											nhất</h4>
									</div>

								</div>

							</div>

							<div class="app-card-body p-3 p-lg-4">

								<div class="chart-container">
									<canvas id="canvas-linechart" height="350"></canvas>
								</div>

							</div>

						</div>

					</div>


					<div class="col-12 col-lg-6">

						<div class="app-card app-card-chart h-100 shadow-sm">

							<div class="app-card-header p-3">

								<div class="row justify-content-between align-items-center">

									<div class="col-auto">
										<h4 class="app-card-title">Số đơn hàng trong 7 ngày gần
											nhất</h4>
									</div>

								</div>

							</div>

							<div class="app-card-body p-3 p-lg-4">

								<div class="chart-container">
									<canvas id="canvas-barchart"></canvas>
								</div>

							</div>

						</div>

					</div>

				</div>

			</div>

		</div>

	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

	<script>
    window.chartColors = {
        green: '#75c181',
        gray: '#a9b5c9',
        text: '#252930',
        border: '#e7e9ed'
    };

    var randomDataPoint = function() {
        return Math.round(Math.random() * 10000)
    };

    document.addEventListener('DOMContentLoaded', function() {
    	fetch('/api/dashboard/chartData')
            .then(res => res.json())
            .then(data => renderLineChart(data))
            .catch(err => console.error(err));


        function renderLineChart(data) {

            const ctx = document.getElementById('canvas-linechart').getContext('2d');


            // const ctx = canvas.getContext('2d');

            const datasets = [{
                label: 'Tuần này',
                data: data.current,
                borderColor: window.chartColors.green,
                backgroundColor: 'transparent',
                tension: 0.3,
                pointRadius: 5,
                pointHoverRadius: 7
            }];

            // Chỉ hiển thị tuần trước nếu có dữ liệu
            if (!data.previous.every(v => v === 0)) {
                datasets.push({
                    label: 'Tuần trước',
                    data: data.previous,
                    borderColor: window.chartColors.gray,
                    borderDash: [5, 5],
                    backgroundColor: 'transparent',
                    tension: 0.3,
                    pointRadius: 4
                });
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' +
                                        context.parsed.y.toLocaleString('vi-VN') + ' đ';
                                }
                            }
                        },
                        // title: {
                        //     display: true,
                        //     text: 'Doanh thu 7 ngày gần nhất'
                        // }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: value =>
                                    value.toLocaleString('vi-VN') + ' đ'
                            },
                            grid: {
                                color: window.chartColors.border
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }
    });
    document.addEventListener('DOMContentLoaded', function() {

    	fetch('/api/dashboard/orderChartData')
            .then(res => res.json())
            .then(res => {

                var ctx = document.getElementById('canvas-barchart').getContext('2d');

                var barChartConfig = {
                    type: 'bar',
                    data: {
                        labels: res.labels,
                        datasets: [{
                            label: 'Đơn hàng',
                            backgroundColor: window.chartColors.green,
                            borderColor: window.chartColors.green,
                            borderWidth: 1,
                            maxBarThickness: 16,
                            data: res.data
                        }]
                    },
                    options: {
                        responsive: true,
                        aspectRatio: 1.5,
                        legend: {
                            position: 'bottom',
                            align: 'end'
                        },
                        title: {
                            display: true,
                            text: 'Orders in last 7 days'
                        },
                        tooltips: {
                            mode: 'index',
                            intersect: false,
                            titleMarginBottom: 10,
                            bodySpacing: 10,
                            xPadding: 16,
                            yPadding: 16,
                            borderColor: window.chartColors.border,
                            borderWidth: 1,
                            backgroundColor: '#fff',
                            bodyFontColor: window.chartColors.text,
                            titleFontColor: window.chartColors.text
                        },
                        scales: {
                            xAxes: [{
                                gridLines: {
                                    drawBorder: false,
                                    color: window.chartColors.border
                                }
                            }],
                            yAxes: [{
                                ticks: {
                                    beginAtZero: true
                                },
                                gridLines: {
                                    drawBorder: false,
                                    color: window.chartColors.border
                                }
                            }]
                        }
                    }
                };

                new Chart(ctx, barChartConfig);
            });
    });
</script>
</body>

</html>
