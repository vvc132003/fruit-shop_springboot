
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Đơn hàng</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">
							Đơn hàng (<span th:text="${count}"></span>)
						</h1>
					</div>

					<div class="col-auto">
						<div class="page-utilities">
							<div
								class="row g-2 justify-content-start justify-content-md-end align-items-center">

								<div class="col-auto">
									<form class="table-search-form row gx-1 align-items-center"
										th:action="@{/orders}" method="get">

										<div class="col-auto">
											<input type="text" id="keyword" name="keyword"
												th:value="${keyword}" class="form-control search-orders"
												placeholder="Tìm kiếm...">
										</div>

										<div class="col-auto">
											<button type="submit" class="btn app-btn-secondary">
												Tìm kiếm</button>
										</div>

									</form>
								</div>

								<div class="col-auto">
									<a class="btn app-btn-secondary" th:href="@{/orders/exportCsv}">
										<svg width="1em" height="1em" viewBox="0 0 16 16"
											class="bi bi-download me-1" fill="currentColor"
											xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd"
												d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
                                        <path fill-rule="evenodd"
												d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z" />
                                    </svg> Download CSV
									</a>
								</div>
								<div class="col-auto">
									<a class="btn app-btn-secondary"
										th:href="@{/orders/exportAllPdf}"> <svg width="1em"
											height="1em" viewBox="0 0 16 16" class="bi bi-download me-1"
											fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                        <path fill-rule="evenodd"
												d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
                                        <path fill-rule="evenodd"
												d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z" />
                                    </svg> Download PDF
									</a>
								</div>

							</div>
						</div>
					</div>
				</div>

				<div class="tab-content" id="orders-table-tab-content">
					<div class="tab-pane fade show active" id="orders-all">

						<div class="app-card app-card-orders-table shadow-sm mb-5">
							<div class="app-card-body">

								<div class="table-responsive">

									<table class="table app-table-hover mb-0 text-left">

										<thead>
											<tr>
												<th class="cell">ID</th>
												<th class="cell">Khách hàng</th>
												<th class="cell">Người nhận</th>
												<th class="cell">Trạng thái</th>
												<th class="cell">Giảm giá</th>
												<th class="cell">Tổng tiền</th>
												<th class="cell">Ngày đặt</th>
												<th class="cell">Hành động</th>
											</tr>
										</thead>

										<tbody>

											<tr th:each="o, index : ${orders}">

												<td class="cell" th:text="${(page-1)*10 + index.index + 1}">
												</td>

												<td class="cell"
													th:text="${o.user != null ? o.user.firstName : 'Guest'}"></td>

												<td class="cell"><span th:text="${o.receiverName}"></span><br>
													<small class="text-muted" th:text="${o.receiverPhone}">
												</small></td>

												<td class="cell"><span class="badge bg-warning"
													th:if="${o.status.name() == 'pending'}"> Chờ xử lý </span>

													<span class="badge bg-info"
													th:if="${o.status.name() == 'shipping'}"> Đang giao
												</span> <span class="badge bg-success"
													th:if="${o.status.name() == 'completed'}"> Hoàn
														thành </span> <span class="badge bg-danger"
													th:if="${o.status.name() == 'cancelled'}"> Đã hủy </span></td>

												<td class="text-danger fw-bold cell"
													th:text="${#numbers.formatDecimal(o.discount,0,'COMMA',0,'POINT')} + ' đ'">
												</td>

												<td class="cell text-danger fw-bold"
													th:text="${#numbers.formatDecimal(o.total,0,'COMMA',0,'POINT')} + ' ₫'">
												</td>

												<td class="cell"
													th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}">
												</td>

												<td class="cell"><a
													class="btn-sm app-btn-secondary me-1"
													th:href="@{/orders/orderdetail(id=${o.id},page=${page})}">
														Xem </a> <a class="btn-sm app-btn-secondary"
													th:if="${o.status.name() == 'pending'}"
													th:href="@{/orders/updateStatusQuick(id=${o.id})}"
													onclick="return confirm('Xác nhận giao đơn hàng này?')">
														Xác nhận giao </a> <a class="btn-sm app-btn-secondary"
													th:if="${o.status.name() == 'shipping'}"
													th:href="@{/orders/updateStatusQuick(id=${o.id})}"
													onclick="return confirm('Hoàn thành đơn hàng này?')">
														Hoàn thành </a> <span class="text-muted"
													th:if="${o.status.name() == 'completed'}"> Hoàn
														thành </span></td>

											</tr>

										</tbody>

									</table>

								</div>
							</div>
						</div>


						<!-- Pagination -->

						<nav class="app-pagination">

							<ul class="pagination justify-content-end">

								<li class="page-item" th:if="${page > 1}"><a
									class="page-link"
									th:href="@{/orders(page=${page-1},keyword=${keyword})}"> «
								</a></li>

								<li class="page-item"
									th:each="i : ${#numbers.sequence(1,totalPages)}"
									th:classappend="${i==page}? 'active'"><a class="page-link"
									th:text="${i}"
									th:href="@{/orders(page=${i},keyword=${keyword})}"> </a></li>

								<li class="page-item" th:if="${page < totalPages}"><a
									class="page-link"
									th:href="@{/orders(page=${page+1},keyword=${keyword})}"> »
								</a></li>

							</ul>

						</nav>

					</div>
				</div>
			</div>
		</div>
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
