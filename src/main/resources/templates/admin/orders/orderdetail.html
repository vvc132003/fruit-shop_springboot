
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Chi tiết đơn hàng</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">
							Chi tiết đơn hàng (<span th:text="${count}"></span>)
						</h1>
					</div>

					<div class="col-auto">
						<a th:href="@{/orders}" class="btn app-btn-secondary">
							<i class="fa fa-arrow-left"></i> Quay lại
						</a>
					</div>
				</div>

				<div class="row mb-5">

					<!-- Người nhận -->
					<div class="col-md-6">
						<h4 class="mb-3">Thông tin người nhận</h4>

						<p>
							<strong>Họ tên:</strong> <span th:text="${order.receiverName}"></span>
						</p>

						<p>
							<strong>SĐT:</strong> <span th:text="${order.receiverPhone}"></span>
						</p>

						<p>
							<strong>Địa chỉ:</strong> <span
								th:text="${order.shippingAddress}"></span>
						</p>
					</div>

					<!-- Thông tin đơn -->
					<div class="col-md-6">

						<h4 class="mb-3">Thông tin đơn hàng</h4>

						<p>
							<strong>Mã đơn:</strong> #<span th:text="${order.id}"></span>
						</p>

						<p>
							<strong>Ngày đặt:</strong> <span
								th:text="${#temporals.format(order.createdAt,'dd/MM/yyyy HH:mm')}"></span>
						</p>


						<p>
							<strong>Trạng thái:</strong> <span class="badge bg-warning"
								th:if="${order.status.name() == 'pending'}">Đang xử lý</span> <span
								class="badge bg-info"
								th:if="${order.status.name() == 'shipping'}">Đang giao</span> <span
								class="badge bg-success"
								th:if="${order.status.name() == 'completed'}">Hoàn thành</span>

							<span class="badge bg-danger"
								th:if="${order.status.name() == 'cancelled'}">Đã huỷ</span>

						</p>

					</div>
				</div>

				<!-- Bảng sản phẩm -->

				<div class="app-card app-card-orders-table shadow-sm mb-5">
					<div class="app-card-body">

						<div class="table-responsive">

							<table class="table app-table-hover mb-0 text-left">

								<thead>
									<tr>
										<th>Ảnh</th>
										<th>Sản phẩm</th>
										<th>Giá</th>
										<th>Số lượng</th>
										<th>Thành tiền</th>
									</tr>
								</thead>

								<tbody>

									<tr th:each="item : ${items}">

										<td><img th:if="${item.product.image != null}"
											th:src="'data:image/jpeg;base64,' + ${item.product.image}"
											style="width: 60px; height: 60px; object-fit: cover; border-radius: 5px;" />

											<span th:if="${item.product.image == null}"> Chưa có
												ảnh </span></td>

										<td th:text="${item.product.name}"></td>

										<td class="text-danger fw-bold"
											th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' đ'">
										</td>

										<td th:text="${item.quantity}"></td>

										<td class="text-danger fw-bold"
											th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' đ'">
										</td>

									</tr>

								</tbody>
							</table>

						</div>
					</div>
				</div>

				<!-- Tổng tiền -->

				<div class="row justify-content-end">

					<div class="col-md-5">

						<div class="bg-light rounded p-4">

							<div class="d-flex justify-content-between mb-3">
								<h5>Tạm tính</h5>
								<h5
									th:text="${#numbers.formatDecimal(order.subtotal,0,'COMMA',0,'POINT')} + ' đ'"></h5>
							</div>


							<div class="d-flex justify-content-between mb-3">
								<h5>Phí vận chuyển</h5>
								<h5>0 đ</h5>
							</div>

							<hr>

							<div class="d-flex justify-content-between">
								<h4 class="text-danger">Tổng cộng</h4>
								<h4 class="text-danger"
									th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' đ'">
								</h4>
							</div>

						</div>

					</div>

				</div>

			</div>
		</div>
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
