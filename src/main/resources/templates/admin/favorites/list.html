
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Yêu thích</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<!-- HEADER -->
				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">
							Sản phẩm yêu thích (<span th:text="${count}"></span>)
						</h1>
					</div>

					<div class="col-auto">
						<form class="table-search-form row gx-1 align-items-center"
							th:action="@{/favorites}" method="get">

							<div class="col-auto">
								<input type="text" name="keyword" th:value="${keyword}"
									class="form-control search-orders"
									placeholder="Tìm sản phẩm / người dùng">
							</div>

							<div class="col-auto">
								<button class="btn app-btn-secondary">Tìm kiếm</button>
							</div>
						</form>
					</div>
				</div>

				<!-- TABLE -->
				<div class="app-card app-card-orders-table shadow-sm mb-5">
					<div class="app-card-body">
						<div class="table-responsive">

							<table class="table app-table-hover mb-0 text-left">

								<thead>
									<tr>
										<th class="cell">ID</th>
										<th class="cell">Khách hàng</th>
										<th class="cell">Sản phẩm</th>
										<th class="cell">Giá</th>
										<th class="cell">Ngày yêu thích</th>
									</tr>
								</thead>

								<tbody>

									<tr th:each="f, index : ${favorites}">

										<td class="cell" th:text="${(page-1)*10 + index.index + 1}">
										</td>

										<td class="cell"
											th:text="${f.user.firstName + ' ' + f.user.lastName}"></td>

										<td class="cell">
											<div class="d-flex align-items-center">

												<img th:src="'data:image/jpeg;base64,' + ${f.product.image}"
													width="45" class="rounded me-2"> <a
													th:href="@{/shop_detail(id=${f.product.id})}"
													target="_blank" th:text="${f.product.name}"> </a> </a>

											</div>
										</td>

										<td class="cell text-danger fw-bold"
											th:text="${#numbers.formatDecimal(f.product.price,0,'COMMA',0,'POINT')} + ' ₫'">
										</td>

										<td class="cell"
											th:text="${#temporals.format(f.createdAt,'dd/MM/yyyy HH:mm')}">
										</td>

									</tr>

									<tr th:if="${#lists.isEmpty(favorites)}">
										<td colspan="5" class="text-center py-4 text-muted">Chưa
											có lượt yêu thích nào ❤️</td>
									</tr>

								</tbody>

							</table>

						</div>
					</div>
				</div>

				<!-- PAGINATION -->

				<nav class="app-pagination">

					<ul class="pagination justify-content-end">

						<li class="page-item" th:if="${page > 1}"><a
							class="page-link"
							th:href="@{/favorites(page=${page-1},keyword=${keyword})}"> «
						</a></li>

						<li class="page-item"
							th:each="i : ${#numbers.sequence(1,totalPages)}"
							th:classappend="${i==page}? 'active'"><a class="page-link"
							th:text="${i}"
							th:href="@{/favorites(page=${i},keyword=${keyword})}"> </a></li>

						<li class="page-item" th:if="${page < totalPages}"><a
							class="page-link"
							th:href="@{/favorites(page=${page+1},keyword=${keyword})}"> »
						</a></li>

					</ul>

				</nav>

			</div>
		</div>
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
