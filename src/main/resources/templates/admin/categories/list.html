
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Loại sản phẩm</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">
							Loại sản phẩm (<span th:text="${count}"></span>)
						</h1>
					</div>
					<div class="col-auto">
						<div class="page-utilities">
							<div
								class="row g-2 justify-content-start justify-content-md-end align-items-center">
								<div class="col-auto">
									<!-- <button type="submit" class="btn app-btn-secondary">Search</button> -->
									<a th:href="@{/categories/create}"
										class="btn app-btn-secondary"> <i class="fa fa-plus"></i>
										Thêm loại sản phẩm
									</a>
								</div>

								<div class="col-auto">
									<form class="table-search-form row gx-1 align-items-center">
										<div class="col-auto">
											<input type="text" id="keyword" th:value="${keyword}"
												name="keyword" class="form-control search-orders"
												placeholder="Tìm kiếm...">
										</div>
										<div class="col-auto">
											<button type="submit" class="btn app-btn-secondary">Tìm
												kiềm</button>
										</div>
									</form>

								</div>
								<!--//col-->
							</div>
							<!--//row-->
						</div>
						<!--//table-utilities-->
					</div>
					<!--//col-auto-->
				</div>
				<!--//row-->
				<div th:if="${success}"
					class="alert alert-success alert-dismissible fade show">
					<span th:text="${success}"></span>

					<button type="button" class="btn-close" data-bs-dismiss="alert">
					</button>
				</div>
				<div class="tab-content" id="orders-table-tab-content">
					<div class="tab-pane fade show active" id="orders-all"
						role="tabpanel" aria-labelledby="orders-all-tab">
						<div class="app-card app-card-orders-table shadow-sm mb-5">
							<div class="app-card-body">
								<div class="table-responsive">

									<table class="table app-table-hover mb-0 text-left">
										<thead>
											<tr>
												<th class="cell">ID</th>
												<th class="cell">Tên loại sản phẩm</th>
												<th class="cell">Hành động</th>
											</tr>
										</thead>
										<tbody>
											<tr th:each="cat, stat : ${categories}">

												<td class="cell" th:text="${stat.index + 1 + (page-1)*5}"></td>

												<td class="cell" th:text="${cat.name}"></td>

												<td class="cell"><a
													class="btn-sm app-btn-secondary me-1"
													th:href="@{/categories/update(id=${cat.id})}"> Sửa </a> <a
													class="btn-sm app-btn-secondary"
													th:href="@{/categories/delete(id=${cat.id})}"
													onclick="return confirm('Bạn có chắc muốn xóa?')"> Xóa
												</a></td>

											</tr>
										</tbody>
									</table>
								</div>
								<!--//table-responsive-->

							</div>
							<!--//app-card-body-->
						</div>
						<!--//app-card-->
						<nav class="app-pagination">
							<ul class="pagination justify-content-end">

								<li class="page-item" th:if="${page > 1}"><a
									class="page-link"
									th:href="@{/categories(page=${page-1}, keyword=${keyword != null ? keyword : ''})}">
										« </a></li>

								<li class="page-item"
									th:each="i : ${#numbers.sequence(1, totalPages)}"
									th:classappend="${i == page} ? 'active'"><a
									class="page-link"
									th:href="@{/categories(page=${i}, keyword=${keyword != null ? keyword : ''})}"
									th:text="${i}"> </a></li>

								<li class="page-item" th:if="${page < totalPages}"><a
									class="page-link"
									th:href="@{/categories(page=${page+1}, keyword=${keyword != null ? keyword : ''})}">
										» </a></li>
							</ul>
						</nav>
						<!--//app-pagination-->

					</div>
					<!--//tab-pane-->
				</div>
				<!--//tab-content-->



			</div>
			<!--//container-fluid-->
		</div>
		<!--//app-content-->
	</div>
	<!--//app-wrapper-->

	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
