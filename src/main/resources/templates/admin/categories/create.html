
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Thêm loại sản phẩm"</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">


</head>

<body class="app">

	<header th:replace="~{/admin/layouts/header :: header}"></header>
	<div class="app-wrapper">

		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">Thêm loại sản phẩm</h1>
					</div>
					<div class="col-auto">
						<div class="page-utilities">
							<div
								class="row g-2 justify-content-start justify-content-md-end align-items-center">
								<div class="col-auto">
									<a th:href="@{/categories}" class="btn app-btn-secondary">
										<i class="fa fa-arrow-left"></i> Quay lại
									</a>
								</div>
							</div>
							<!--//row-->
						</div>
						<!--//table-utilities-->
					</div>
					<!--//col-auto-->
				</div>
				<!--//row-->

				<div class="g-4 settings-section">

					<div class="col-12 col-md-12">
						<div class="app-card app-card-settings shadow-sm p-4">
							<div class="app-card-body">
								<!-- Spring form handling -->
								<form th:action="@{/categories/save}" th:object="${category}"
									method="POST" enctype="multipart/form-data"
									class="settings-form">
									<div class="mb-3">
										<label for="setting-input-1" class="form-label">Tên
											loại sản phẩm</label>
										<!-- Sử dụng th:field để ánh xạ với đối tượng 'category' -->
										<input type="text" class="form-control" th:field="*{name}"
											id="name" required>
									</div>
									<div class="form-actions"
										style="display: flex; justify-content: end;">
										<button type="submit" class="btn app-btn-primary">Thêm
											loại sản phẩm</button>
									</div>
								</form>
							</div>
							<!--//app-card-body-->

						</div>
						<!--//app-card-->
					</div>
				</div>

			</div>
			<!--//container-xl-->
		</div>
		<!--//app-content-->
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
