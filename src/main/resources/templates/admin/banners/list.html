
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Thiết lập giao diện</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{admin/layouts/header :: header}"></header>

	<div class="app-wrapper">
		<div class="app-content pt-3 p-md-3 p-lg-4">
			<div class="container-xl">

				<!-- HEADER -->
				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">
							Thiết lập giao diện (<span th:text="${count}"></span>)
						</h1>
					</div>

					<div class="col-auto">
						<a th:href="@{/banners/create}" class="btn app-btn-secondary">
							<i class="fa fa-plus"></i> Thêm
						</a>
					</div>
				</div>
				<div th:if="${success}"
					class="alert alert-success alert-dismissible fade show">
					<span th:text="${success}"></span>

					<button type="button" class="btn-close" data-bs-dismiss="alert">
					</button>
				</div>
				<!-- TABLE -->
				<div class="tab-content" id="orders-table-tab-content">
					<div class="tab-pane fade show active" id="orders-all"
						role="tabpanel" aria-labelledby="orders-all-tab">
						<div class="app-card app-card-orders-table shadow-sm mb-5">
							<div class="app-card-body">
								<div class="table-responsive">

									<table class="table app-table-hover mb-0 text-left">
										<thead>
											<tr>
												<th class="cell">ID</th>
												<th class="cell">Hình ảnh</th>
												<th class="cell">Tiêu đề</th>
												<th class="cell">Vị trí</th>
												<th class="cell">Trạng thái</th>
												<th class="cell">Hành động</th>
											</tr>
										</thead>

										<tbody>

											<tr th:each="banner, stat : ${banners}">

												<!-- ID -->
												<td class="cell"
													th:text="${(page - 1) * 10 + stat.index + 1}"></td>

												<!-- IMAGE -->
												<td class="cell"><img th:if="${banner.image != null}"
													th:src="${banner.image}" style="height: 60px"></td>

												<!-- TITLE -->
												<td class="cell" th:text="${banner.title}"></td>

												<!-- POSITION -->
												<td class="cell" th:text="${banner.position}"></td>

												<!-- STATUS -->
												<td class="cell"><span
													th:if="${banner.status.name() == 'active'}"
													class="badge bg-success"> Hiển thị </span> <span
													th:if="${banner.status.name() == 'inactive'}"
													class="badge bg-secondary"> Ẩn </span></td>

												<!-- ACTION -->
												<td class="cell"><a
													class="btn-sm app-btn-secondary me-1"
													th:href="@{/banners/update(id=${banner.id},page=${page})}">
														Sửa </a> <a class="btn-sm app-btn-secondary"
													th:href="@{/banners/delete(id=${banner.id})}"
													onclick="return confirm('Xóa banner này?')"> Xóa </a></td>

											</tr>

										</tbody>
									</table>

								</div>
							</div>
						</div>

						<!-- PAGINATION -->
						<nav class="app-pagination">

							<ul class="pagination justify-content-end">

								<!-- PREVIOUS -->
								<li class="page-item" th:if="${page > 1}"><a
									class="page-link" th:href="@{/banners(page=${page-1})}"> «
								</a></li>

								<!-- PAGE NUMBER -->
								<li class="page-item"
									th:each="i : ${#numbers.sequence(1,totalPages)}"
									th:classappend="${i == page} ? 'active'"><a
									class="page-link" th:text="${i}"
									th:href="@{/banners(page=${i})}"> </a></li>

								<!-- NEXT -->
								<li class="page-item" th:if="${page < totalPages}"><a
									class="page-link" th:href="@{/banners(page=${page+1})}"> »
								</a></li>

							</ul>

						</nav>

					</div>
				</div>

			</div>
		</div>
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
