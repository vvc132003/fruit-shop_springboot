
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
<title>Đổi mật khẩu</title>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description"
	content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
<meta name="author" content="Xiaoying Riley at 3rd Wave Media">
<link rel="stylesheet" href="/assets/css/portal.css" media="all">
<link rel="shortcut icon" href="/assets/images/app-logo.svg">


</head>

<body class="app">

	<header th:replace="~{/admin/layouts/header :: header}"></header>
	<div class="app-wrapper">
		<div class="app-content p-4">
			<div class="container-xl">

				<div class="row g-3 mb-4 align-items-center justify-content-between">
					<div class="col-auto">
						<h1 class="app-page-title mb-0">Đổi mật khẩu</h1>
					</div>
					<div class="col-auto">
						<a th:href="@{/dashboard}" class="btn app-btn-secondary">
							<i class="fa fa-arrow-left"></i> Quay lại
						</a>
					</div>
				</div>

				<!-- ERROR -->
				<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

				<!-- SUCCESS -->
				<div th:if="${success}" class="alert alert-success"
					th:text="${success}"></div>

				<div class="app-card p-4 shadow-sm">

					<form th:action="@{/auth/updatePassword}" method="post">

						<div class="mb-3">
							<label class="form-label">Mật khẩu hiện tại</label> <input
								type="password" name="currentPassword" class="form-control"
								required>
						</div>

						<div class="mb-3">
							<label class="form-label">Mật khẩu mới</label> <input
								type="password" name="newPassword" class="form-control" required>
						</div>

						<div class="mb-3">
							<label class="form-label">Xác nhận mật khẩu mới</label> <input
								type="password" name="confirmPassword" class="form-control"
								required>
						</div>

						<div class="text-end">
							<button class="btn app-btn-primary">Cập nhật mật khẩu</button>
						</div>

					</form>

				</div>

			</div>
		</div>
	</div>
	<script src="/assets/js/all.min.js"></script>
	<script src="/assets/plugins/popper.min.js"></script>
	<script src="/assets/plugins/bootstrap/js/bootstrap.min.js"></script>
	<script src="/assets/plugins/chart.js/chart.min.js"></script>
	<script src="/assets/js/index-charts.js"></script>
	<script src="/assets/js/app.js"></script>

	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
